version: 0.2
phases:
  install:
    commands:
      # Install any necessary dependencies here if not in the Docker image
      # e.g., 'npm install' or 'pip install'
      - echo "Install phase complete."
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      # Use the AWS CLI to get a login password and pipe it to docker login
      # The CodeBuild service role needs ECR permissions for this to work
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  build:
    commands:
      - echo "Building the Docker image..."
      # Build the Docker image and tag it with 'latest' and a specific tag (e.g., commit hash)
      - docker build -t $ECR_REPOSITORY_URI:latest .
      - docker tag $ECR_REPOSITORY_URI:latest $ECR_REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
  post_build:
    commands:
      - echo "Pushing the Docker images to Amazon ECR..."
      # Push the tagged images to ECR
      - docker push $ECR_REPOSITORY_URI:latest
      - docker push $ECR_REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - echo "Writing image definitions file..."
      # Create an imagedefinitions.json file for use in AWS CodePipeline (optional)
      - printf '[{"name":"YOUR_CONTAINER_NAME","imageUri":"%s"}]' $ECR_REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION > imagedefinitions.json
artifacts:
  files:
    # Specify the file to pass to the next stage of the pipeline (e.g., ECS deployment)
    - imagedefinitions.json
